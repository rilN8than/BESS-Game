<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BESS Contract Game</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f4f0;color:#1a1a1a;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:0}
#app{width:100%;max-width:480px;min-height:100vh;background:#fff;padding:0}
.pad{padding:1.5rem 1.25rem}

/* Typography */
.label{font-size:11px;font-weight:600;letter-spacing:.06em;color:#888;margin-bottom:6px}
h1{font-size:22px;font-weight:600;margin:.5rem 0 6px}
h2{font-size:18px;font-weight:600;margin:.5rem 0 6px}
p{font-size:14px;color:#666;line-height:1.65}

/* Inputs */
input{width:100%;padding:11px 14px;border:1.5px solid #e0e0e0;border-radius:10px;font-size:14px;font-family:inherit;outline:none;transition:border .15s}
input:focus{border-color:#1a1a1a}

/* Buttons */
button{font-family:inherit;cursor:pointer;transition:all .15s}
.btn-primary{width:100%;padding:14px;background:#1a1a1a;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:600}
.btn-primary:hover{background:#333}
.btn-primary:disabled{background:#ccc;cursor:not-allowed}
.btn-outline{width:100%;padding:14px;background:#fff;color:#1a1a1a;border:1.5px solid #e0e0e0;border-radius:12px;font-size:14px;font-weight:500}
.btn-outline:hover{border-color:#1a1a1a}
.btn-small{padding:10px 14px;border:1.5px solid #e0e0e0;border-radius:9px;background:#fff;font-size:13px;font-weight:500}
.btn-small:hover{border-color:#1a1a1a}

/* Cards */
.card{background:#f7f6f2;border-radius:14px;padding:1rem 1.125rem;margin-bottom:.875rem}
.card-white{background:#fff;border:1.5px solid #e8e8e8;border-radius:14px;padding:.875rem 1rem;margin-bottom:.75rem}
.card-white.selected{border-width:2px;background:#fafafa}
.card-white.winner{border-width:2px}

/* Option buttons */
.opt-btn{width:100%;padding:12px 14px;background:#fff;border:1.5px solid #e0e0e0;border-radius:12px;text-align:left;display:flex;gap:12px;align-items:flex-start;cursor:pointer;margin-bottom:.5rem;transition:all .15s}
.opt-btn:hover{border-color:#aaa}
.opt-btn.on{border-width:2px;background:#fafafa}

/* Dot */
.dot{border-radius:50%;display:inline-flex;align-items:center;justify-content:center;color:#fff;font-weight:700;flex-shrink:0}

/* Status badges */
.badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:600}

/* QR */
#qr-box{background:#fff;border:1.5px solid #e0e0e0;border-radius:10px;padding:6px;display:inline-block}
#qr-box img,#qr-box canvas{display:block}

/* Animations */
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.pulse{animation:blink 1.8s ease-in-out infinite}
@keyframes fadein{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.fade{animation:fadein .25s ease}

/* Score color */
.pos{color:#0a7c5c}
.neg{color:#c0392b}
.neu{color:#888}

/* Divider */
.divider{border:none;border-top:1px solid #f0f0f0;margin:.875rem 0}
</style>
</head>
<body>
<div id="app"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
const {useState,useEffect,useRef,useCallback}=React;
const h=React.createElement;

/* ── Constants ─────────────────────────────────────────────────── */
const TC=['#1D9E75','#2176AE','#BA7517','#C0392B','#6C3FB5','#C25B7A'];
const ASSET='20MW / 40MWh · Germany · COD June 2027 · 15yr tenor';

const CD={
  A:{name:'Fixed internal tolling',icon:'🔒',col:'#2176AE',
    gets:'EEM pays EIS a fixed annual fee and keeps all trading upside',
    risk:'Fee owed to EIS regardless of market outcome',
    q:'What fee do you offer EIS per MW per year?',
    hint:'Lower fee = better for EEM but EIS may push back. Higher = deal-certain but costs more.',
    params:[
      {id:'100k',label:'€100k / MW / yr',sub:'€2.0M/yr total — aggressive'},
      {id:'120k',label:'€120k / MW / yr',sub:'€2.4M/yr total — market standard'},
      {id:'140k',label:'€140k / MW / yr',sub:'€2.8M/yr total — premium, deal-certain'}
    ]},
  B:{name:'Floor + revenue share',icon:'⚖️',col:'#1D9E75',
    gets:'Keeps a negotiated % of revenues above the floor (floor = €100k/MW/yr)',
    risk:'EEM absorbs shortfall if revenues fall below the floor',
    q:'What % of revenues above the floor does EEM keep?',
    hint:'Floor is fixed at €100k/MW/yr (€2M/yr). Higher % = more upside in good markets.',
    params:[
      {id:'50',label:'50% rev share',sub:'EEM keeps half the upside above floor'},
      {id:'70',label:'70% rev share',sub:'EEM keeps most upside above floor'},
      {id:'90',label:'90% rev share',sub:'EEM keeps nearly all upside above floor'}
    ]},
  C:{name:'Full merchant',icon:'⚡',col:'#BA7517',
    gets:'Dispatches freely, keeps all revenue (pays EIS ~€30k/MW/yr variable cost only)',
    risk:'Fully uncapped — EEM owns the entire P&L, upside and downside',
    q:'Where do you optimise revenue first?',
    hint:'You own the full P&L. Strategy determines exposure to specific market shocks.',
    params:[
      {id:'FCR',label:'FCR-first',sub:'Primary frequency response · stable daily auctions'},
      {id:'aFRR',label:'aFRR-first',sub:'Balancing market · large volumes, more complexity'},
      {id:'Arbitrage',label:'Arbitrage-first',sub:'DA/ID price spreads · volatile, high ceiling'}
    ]}
};

const SC=[
  {id:'bull',emoji:'📈',accent:'#1D9E75',rtype:'Market dynamics — upside',
   title:'Bull run',headline:'Revenues 40% above forecast',
   detail:'FCR prices held firm, aFRR demand surged with renewable volatility, and DA/ID spreads widened significantly. The asset printed well above base case across all products.',
   takeaway:'Contract structure determined how much of this bull run EEM kept. Merchant players took all the upside. Fixed tolling teams made money — but capped their own ceiling.',
   hint:'Optimal: Contract C (Merchant) + Arbitrage-first — fully uncapped upside in a spread-rich market.',
   scores:{A:{'100k':28,'120k':20,'140k':12},B:{'50':14,'70':24,'90':36},C:{FCR:28,aFRR:32,Arbitrage:40}}},
  {id:'crash',emoji:'📉',accent:'#C0392B',rtype:'Market dynamics — downside',
   title:'Market shock',headline:'New BESS supply flooded Germany — revenues 45% below forecast',
   detail:'A wave of new battery capacity entered the market, crashing FCR prices 40%. aFRR and arbitrage spreads compressed. Revenue stack collapsed across all products.',
   takeaway:'EEM bears market risk as the optimiser regardless of contract. But structure determines how much you also owe EIS when revenues collapse. Fixed tolling limited the damage.',
   hint:'Optimal: Contract A (Fixed tolling) + Low fee (€100k/MW) — capped EEM cost and limited downside exposure.',
   scores:{A:{'100k':-6,'120k':-14,'140k':-22},B:{'50':-16,'70':-22,'90':-30},C:{FCR:-40,aFRR:-22,Arbitrage:-28}}},
  {id:'delay',emoji:'⏳',accent:'#BA7517',rtype:'Build risk',
   title:'Build delay',headline:'COD pushed 12 months to June 2028',
   detail:'Grid connection permitting ran over by 12 months. EIS bears the construction overrun — but EEM loses Year 1, the highest-value year on a 15yr declining revenue curve.',
   takeaway:'Build risk sits with EIS on paper. But losing the most valuable year of the contract is costly for EEM — especially strategies with high expected Year 1 revenues.',
   hint:'Optimal: Contract A or B — uniform delay impact, lower expected Year 1 returns meant less opportunity cost than Merchant Arbitrage.',
   scores:{A:{'100k':-10,'120k':-10,'140k':-10},B:{'50':-12,'70':-12,'90':-12},C:{FCR:-15,aFRR:-20,Arbitrage:-26}}},
  {id:'policy',emoji:'⚖️',accent:'#6C3FB5',rtype:'Policy change',
   title:'Regulatory shock',headline:'BNetzA caps aFRR access for standalone BESS',
   detail:'New ruling restricts aFRR participation for assets without a network service agreement with the TSO. FCR access unaffected. Arbitrage moderately impacted by associated rule changes.',
   takeaway:'Policy risk hits EEM as the licenced market participant across all contracts. Fixed tolling teams still owe EIS their fee — now with reduced revenues to cover it.',
   hint:'Optimal: Contract C (Merchant) + FCR-first — the only position largely insulated from this specific regulatory shock.',
   scores:{A:{'100k':-5,'120k':-9,'140k':-14},B:{'50':-10,'70':-16,'90':-24},C:{FCR:-4,aFRR:-32,Arbitrage:-14}}}
];

/* ── Utilities ─────────────────────────────────────────────────── */
const genCode=()=>{const c='ABCDEFHJKLMNPQRSTUVWXY3456789';return Array.from({length:4},()=>c[Math.floor(Math.random()*c.length)]).join('')};
const genId=()=>Math.random().toString(36).substr(2,10);
const sk=g=>`bessv7_${g}`;

const storage={
  get:async(key)=>{
    try{const r=await window.storage.get(key,true);return r?JSON.parse(r.value):null}
    catch{return null}
  },
  set:async(key,val)=>{
    try{await window.storage.set(key,JSON.stringify(val),true);return true}
    catch{return false}
  }
};

/* ── Small components ──────────────────────────────────────────── */
function Dot({color,size=30,name}){
  return h('div',{className:'dot',style:{width:size,height:size,background:color,fontSize:size*.38}},name[0].toUpperCase())
}

function ScoreNum({v}){
  const cls=v>0?'pos':v<0?'neg':'neu';
  return h('span',{className:cls,style:{fontSize:20,fontWeight:700}},`${v>0?'+':''}${v}`)
}

function QRCode({content,size=150}){
  const ref=useRef(null);
  useEffect(()=>{
    if(!ref.current||!content||!window.QRCode)return;
    ref.current.innerHTML='';
    try{new window.QRCode(ref.current,{text:content,width:size,height:size,colorDark:'#111',colorLight:'#fff'})}catch(e){}
  },[content,size]);
  return h('div',{id:'qr-box',ref});
}

/* ── Host: Lobby ───────────────────────────────────────────────── */
function HostLobby({code,teams,onStart}){
  const base=(()=>{try{const u=window.location.href;return u.startsWith('http')?u.split('#')[0]:''}catch{return''}})();
  const [custom,setCustom]=useState('');
  const eff=base||custom.trim();
  const qrContent=eff?`${eff}#${code}`:`Game code: ${code}`;

  return h('div',{className:'pad fade'},
    h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'1.5rem'}},
      h('div',null,
        h('div',{className:'label'},'HOST · BESS CONTRACT GAME'),
        h('h2',null,'Waiting for teams')
      ),
      h('div',{style:{textAlign:'right'}},
        h('div',{className:'label'},'GAME CODE'),
        h('div',{style:{fontSize:38,fontWeight:800,letterSpacing:'.2em',fontFamily:'monospace',lineHeight:1}},code)
      )
    ),

    h('div',{style:{display:'flex',gap:16,alignItems:'flex-start',marginBottom:'1.25rem'}},
      h(QRCode,{content:qrContent,size:140}),
      h('div',null,
        h('p',{style:{fontWeight:600,fontSize:14,color:'#1a1a1a',marginBottom:8}},'Scan to join'),
        h('ol',{style:{paddingLeft:16,fontSize:13,color:'#666',lineHeight:2.2}},
          h('li',null,'Scan QR or open the link'),
          h('li',null,'Enter your team name'),
          h('li',null,'Tap Join ↗')
        )
      )
    ),

    !base&&h('div',{style:{marginBottom:'1rem'}},
      h('div',{className:'label'},'PASTE YOUR PAGE URL (FOR QR LINK)'),
      h('input',{value:custom,onChange:e=>setCustom(e.target.value),placeholder:'https://...',style:{fontSize:12}})
    ),

    h('div',{className:'card'},
      h('div',{className:'label'},'THE ASSET'),
      h('div',{style:{fontWeight:600,fontSize:13,marginBottom:2}},ASSET),
      h('div',{style:{fontSize:12,color:'#888'}},'Teams play as EEM · EIS owns the asset · Negotiate your contract')
    ),

    h('div',{style:{marginBottom:'1.25rem'}},
      h('div',{className:'label'},`TEAMS JOINED (${teams.length})`),
      teams.length===0
        ?h('p',{style:{fontStyle:'italic'}},'No teams yet — share the code or QR')
        :teams.map((t,i)=>h('div',{key:i,style:{display:'flex',alignItems:'center',gap:10,padding:'8px 0',borderBottom:'1px solid #f0f0f0'}},
            h(Dot,{color:TC[i%6],size:28,name:t.name}),
            h('span',{style:{fontSize:14,fontWeight:500}},t.name)
          ))
    ),

    h('button',{className:'btn-primary',onClick:onStart,disabled:teams.length<1,style:{opacity:teams.length>=1?1:.35}},
      teams.length===0?'Waiting for teams...':(`Start game — ${teams.length} team${teams.length!==1?'s':''} ↗`))
  )
}

/* ── Host: Decisions ───────────────────────────────────────────── */
function HostDecisions({code,teams,allLocked,onReveal}){
  return h('div',{className:'pad fade'},
    h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'1.5rem'}},
      h('div',null,
        h('div',{className:'label'},'HOST · BESS CONTRACT GAME'),
        h('h2',null,'Teams are deciding...')
      ),
      h('div',{style:{textAlign:'right'}},
        h('div',{className:'label'},'CODE'),
        h('div',{style:{fontSize:28,fontWeight:800,letterSpacing:'.16em',fontFamily:'monospace'}},code)
      )
    ),
    teams.map((t,i)=>h('div',{key:i,style:{
      display:'flex',alignItems:'center',justifyContent:'space-between',
      padding:'14px',marginBottom:8,background:'#fff',
      border:t.locked?`2.5px solid ${TC[i%6]}`:'1.5px solid #e8e8e8',
      borderRadius:12
    }},
      h('div',{style:{display:'flex',alignItems:'center',gap:10}},
        h(Dot,{color:TC[i%6],size:30,name:t.name}),
        h('span',{style:{fontSize:14,fontWeight:t.locked?600:400}},t.name)
      ),
      t.locked
        ?h('span',{className:'badge',style:{background:TC[i%6]+'18',color:TC[i%6]}},'Locked in ✓')
        :h('span',{style:{display:'flex',alignItems:'center',gap:6,fontSize:12,color:'#888'}},
            h('span',{className:'pulse',style:{width:8,height:8,borderRadius:'50%',background:'#BA7517',display:'inline-block'}}),
            'Deciding...'
          )
    )),
    h('div',{style:{marginTop:'1.5rem'}},
      allLocked
        ?h('button',{className:'btn-primary',onClick:onReveal},'Reveal the scenario ↗')
        :h('div',null,
            h('p',{style:{textAlign:'center',marginBottom:12}},'Waiting for all teams to lock in...'),
            h('button',{className:'btn-outline',onClick:onReveal,style:{opacity:.5}},'Force reveal ↗')
          )
    )
  )
}

/* ── Host: Scores ──────────────────────────────────────────────── */
function HostScores({gs,onNewGame}){
  const sc=gs.scenario;
  const teams=Object.values(gs.teams).map((t,i)=>({...t,ci:i,score:sc.scores[t.contract]?.[t.param]??0})).sort((a,b)=>b.score-a.score);
  const max=Math.max(...teams.map(t=>t.score));
  return h('div',{className:'pad fade'},
    h('div',{style:{border:`2.5px solid ${sc.accent}`,borderRadius:14,padding:'1.125rem',marginBottom:'1.25rem',background:sc.accent+'08'}},
      h('div',{style:{fontSize:28,marginBottom:6}},sc.emoji),
      h('div',{style:{fontSize:11,fontWeight:700,color:sc.accent,letterSpacing:'.05em',marginBottom:3}},sc.rtype.toUpperCase()),
      h('div',{style:{fontSize:16,fontWeight:700,marginBottom:5}},sc.title),
      h('div',{style:{fontSize:13,fontWeight:600,marginBottom:6}},sc.headline),
      h('div',{style:{fontSize:12,color:'#555',lineHeight:1.65,marginBottom:8}},sc.detail),
      h('hr',{className:'divider'}),
      h('div',{style:{fontSize:12,color:'#666',lineHeight:1.6}},sc.takeaway)
    ),
    h('div',{className:'label',style:{marginBottom:10}},'SCOREBOARD'),
    teams.map((t,rank)=>{
      const def=CD[t.contract];const pDef=def?.params.find(p=>p.id===t.param);const isW=t.score===max;
      return h('div',{key:t.name+rank,className:'card-white'+(isW?' winner':''),style:{borderColor:isW?TC[t.ci%6]:'#e8e8e8'}},
        h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}},
          h('div',{style:{display:'flex',alignItems:'center',gap:8}},
            h('span',{style:{fontSize:13,color:'#aaa',width:18}},`${rank+1}.`),
            h(Dot,{color:TC[t.ci%6],size:28,name:t.name}),
            h('span',{style:{fontSize:14,fontWeight:600}},t.name),
            isW&&h('span',{className:'badge',style:{background:'#FAC775',color:'#412402',marginLeft:4}},'Winner 🏆')
          ),
          h(ScoreNum,{v:t.score})
        ),
        h('div',{style:{display:'flex',gap:6,flexWrap:'wrap'}},
          def&&h('span',{className:'badge',style:{background:def.col+'18',color:def.col}},`Contract ${t.contract}: ${def.name}`),
          pDef&&h('span',{className:'badge',style:{background:'#f0f0f0',color:'#555'}},pDef.label)
        )
      )
    }),
    h('div',{style:{background:'#f7f6f2',borderRadius:12,padding:'1rem',margin:'1rem 0'}},
      h('div',{className:'label'},'OPTIMAL PLAY'),
      h('div',{style:{fontSize:13,lineHeight:1.7}},sc.hint)
    ),
    h('button',{className:'btn-outline',onClick:onNewGame},'Start new game')
  )
}

/* ── Player: Join ──────────────────────────────────────────────── */
function JoinScreen({code,setCode,name,setName,onJoin,err,loading}){
  return h('div',{className:'pad fade'},
    h('div',{style:{fontSize:40,marginBottom:'1rem'}},'⚡'),
    h('h1',null,'Join the game'),
    h('p',{style:{marginBottom:'1.5rem'}},'Enter the 4-character code from the projector and your team name.'),
    h('div',{style:{marginBottom:12}},
      h('div',{className:'label'},'GAME CODE'),
      h('input',{value:code,onChange:v=>setCode(v.target.value.toUpperCase().slice(0,4)),
        placeholder:'e.g. BXKJ',maxLength:4,
        style:{fontSize:28,letterSpacing:'.25em',textAlign:'center',fontFamily:'monospace',fontWeight:700}})
    ),
    h('div',{style:{marginBottom:16}},
      h('div',{className:'label'},'TEAM NAME'),
      h('input',{value:name,onChange:v=>setName(v.target.value),placeholder:'e.g. Team Alpha',autoFocus:!code})
    ),
    err&&h('div',{style:{fontSize:13,color:'#c0392b',marginBottom:12,padding:'8px 12px',background:'#fdf0f0',borderRadius:8}},err),
    h('button',{className:'btn-primary',onClick:onJoin,
      disabled:loading||code.length<4||!name.trim(),
      style:{opacity:(loading||code.length<4||!name.trim())?.35:1}},
      loading?'Joining...':'Join game ↗')
  )
}

/* ── Player: Lobby ─────────────────────────────────────────────── */
function PlayerLobby({myName,teams}){
  return h('div',{className:'pad fade',style:{textAlign:'center'}},
    h('div',{style:{fontSize:48,margin:'1.5rem 0 1rem'}},'⏳'),
    h('h2',null,`You're in${myName?`, ${myName}`:''}!`),
    h('p',{style:{marginBottom:'1.5rem'}},'Waiting for the host to start the game...'),
    h('div',{style:{textAlign:'left'}},
      h('div',{className:'label'},`TEAMS IN LOBBY (${teams.length})`),
      teams.map((t,i)=>h('div',{key:i,style:{display:'flex',alignItems:'center',gap:10,padding:'8px 0',borderBottom:'1px solid #f0f0f0',fontSize:14}},
        h(Dot,{color:TC[i%6],size:26,name:t.name}),t.name
      ))
    )
  )
}

/* ── Player: Decisions ─────────────────────────────────────────── */
function PlayerDecisions({dec,setDec,onLock}){
  const {contract,param}=dec;const cDef=contract?CD[contract]:null;const canLock=!!(contract&&param);
  return h('div',{className:'pad fade'},
    h('div',{className:'card'},
      h('div',{className:'label'},'YOU ARE EEM'),
      h('div',{style:{fontWeight:600,fontSize:13,marginBottom:2}},ASSET),
      h('div',{style:{fontSize:12,color:'#888'}},'EIS owns the asset. Choose your contract structure.')
    ),
    h('div',{className:'label',style:{marginBottom:8}},'STEP 1 — CONTRACT TYPE'),
    ['A','B','C'].map(cId=>{
      const def=CD[cId];const sel=contract===cId;
      return h('button',{key:cId,onClick:()=>setDec({contract:cId,param:null}),
        className:'opt-btn'+(sel?' on':''),
        style:{borderColor:sel?def.col:'#e0e0e0',borderWidth:sel?2:1.5}},
        h('div',{style:{fontSize:20,flexShrink:0,marginTop:1}},def.icon),
        h('div',null,
          h('div',{style:{fontSize:13,fontWeight:sel?700:500,color:'#1a1a1a'}},`Contract ${cId} — ${def.name}`),
          h('div',{style:{fontSize:11,color:'#666',marginTop:2}},def.gets),
          h('div',{style:{fontSize:11,color:'#c0392b',marginTop:1}},`Risk: ${def.risk}`)
        )
      )
    }),
    cDef&&h('div',{style:{marginTop:'1.25rem'}},
      h('div',{className:'label',style:{marginBottom:8}},'STEP 2 — YOUR TERMS'),
      h('div',{style:{fontSize:13,fontWeight:500,marginBottom:4}},cDef.q),
      h('div',{style:{fontSize:11,color:'#888',marginBottom:10}},cDef.hint),
      cDef.params.map(p=>{
        const sel=param===p.id;
        return h('button',{key:p.id,onClick:()=>setDec(prev=>({...prev,param:p.id})),
          className:'opt-btn'+(sel?' on':''),
          style:{justifyContent:'space-between',borderColor:sel?cDef.col:'#e0e0e0',borderWidth:sel?2:1.5}},
          h('div',null,
            h('div',{style:{fontSize:13,fontWeight:sel?700:500}},p.label),
            h('div',{style:{fontSize:11,color:'#888',marginTop:2}},p.sub)
          ),
          sel&&h('span',{style:{fontSize:18,color:cDef.col}},'✓')
        )
      })
    ),
    h('button',{className:'btn-primary',onClick:onLock,disabled:!canLock,style:{marginTop:'1.25rem',opacity:canLock?1:.3}},'Lock in my decision ↗')
  )
}

/* ── Player: Waiting ───────────────────────────────────────────── */
function PlayerWaiting({teams,dec}){
  const locked=teams.filter(t=>t.locked).length;
  const cDef=CD[dec?.contract];const pDef=cDef?.params.find(p=>p.id===dec?.param);
  return h('div',{className:'pad fade',style:{textAlign:'center'}},
    h('div',{style:{fontSize:48,margin:'1.5rem 0 1rem'}},'🔒'),
    h('h2',null,'Decision locked'),
    cDef&&h('div',{className:'card',style:{textAlign:'left',marginTop:'1rem'}},
      h('div',{className:'label'},'YOUR DECISION'),
      h('div',{style:{fontWeight:600}},`Contract ${dec.contract} — ${cDef.name}`),
      pDef&&h('div',{style:{fontSize:13,color:'#666',marginTop:2}},pDef.label)
    ),
    h('p',{style:{margin:'0 0 1.25rem'}},`${locked} of ${teams.length} teams locked in`),
    h('div',{style:{textAlign:'left'}},
      teams.map((t,i)=>h('div',{key:i,style:{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'8px 0',borderBottom:'1px solid #f0f0f0',fontSize:13}},
        h('div',{style:{display:'flex',alignItems:'center',gap:8}},h(Dot,{color:TC[i%6],size:24,name:t.name}),t.name),
        t.locked?h('span',{style:{color:'#1D9E75',fontWeight:700}},'✓'):h('span',{className:'pulse',style:{width:8,height:8,borderRadius:'50%',background:'#BA7517',display:'inline-block'}})
      ))
    )
  )
}

/* ── Player: Scores ────────────────────────────────────────────── */
function PlayerScores({gs,myId}){
  const sc=gs.scenario;
  const teams=Object.entries(gs.teams).map(([id,t],i)=>({...t,id,ci:i,score:sc.scores[t.contract]?.[t.param]??0}));
  const sorted=[...teams].sort((a,b)=>b.score-a.score);
  const me=teams.find(t=>t.id===myId);
  const myScore=sc.scores[me?.contract]?.[me?.param]??0;
  const max=Math.max(...sorted.map(t=>t.score));
  return h('div',{className:'pad fade'},
    h('div',{style:{border:`2.5px solid ${sc.accent}`,borderRadius:14,padding:'1.125rem',marginBottom:'1.25rem',background:sc.accent+'08'}},
      h('div',{style:{fontSize:28,marginBottom:4}},sc.emoji),
      h('div',{style:{fontSize:11,fontWeight:700,color:sc.accent,letterSpacing:'.05em',marginBottom:3}},sc.rtype.toUpperCase()),
      h('div',{style:{fontSize:15,fontWeight:700,marginBottom:4}},sc.title),
      h('div',{style:{fontSize:13,color:'#555'}},sc.headline)
    ),
    me&&h('div',{style:{border:`2.5px solid ${TC[me.ci%6]}`,borderRadius:12,padding:'1rem',marginBottom:'1.25rem'}},
      h('div',{className:'label'},'YOUR RESULT'),
      h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center'}},
        h('div',null,
          h('div',{style:{fontWeight:600,fontSize:14}},`Contract ${me.contract} — ${CD[me.contract]?.name}`),
          h('div',{style:{fontSize:12,color:'#888',marginTop:2}},CD[me.contract]?.params.find(p=>p.id===me.param)?.label)
        ),
        h(ScoreNum,{v:myScore})
      )
    ),
    h('div',{className:'label',style:{marginBottom:10}},'SCOREBOARD'),
    sorted.map((t,rank)=>{
      const isW=t.score===max;
      return h('div',{key:t.id,style:{
        display:'flex',justifyContent:'space-between',alignItems:'center',
        padding:'12px',marginBottom:6,background:'#fff',
        border:isW?`2.5px solid ${TC[t.ci%6]}`:'1.5px solid #e8e8e8',
        borderRadius:12
      }},
        h('div',{style:{display:'flex',alignItems:'center',gap:8}},
          h('span',{style:{fontSize:12,color:'#aaa',width:16}},`${rank+1}.`),
          h(Dot,{color:TC[t.ci%6],size:26,name:t.name}),
          h('span',{style:{fontSize:14,fontWeight:500}},t.name),
          t.id===myId&&h('span',{className:'badge',style:{background:'#f0f0f0',color:'#666'}},'you'),
          isW&&h('span',{className:'badge',style:{background:'#FAC775',color:'#412402'}},'Winner 🏆')
        ),
        h(ScoreNum,{v:t.score})
      )
    }),
    h('div',{style:{background:'#f7f6f2',borderRadius:12,padding:'1rem',marginTop:'1rem'}},
      h('div',{className:'label'},'OPTIMAL PLAY'),
      h('div',{style:{fontSize:13,lineHeight:1.7}},sc.hint)
    )
  )
}

/* ── App ───────────────────────────────────────────────────────── */
function App(){
  const initialHash=(()=>{try{const h=window.location.hash.slice(1).toUpperCase();return/^[A-Z0-9]{4}$/.test(h)?h:''}catch{return''}})();
  const [screen,setScreen]=useState(initialHash?'player_join':'welcome');
  const [gameCode,setGameCode]=useState('');
  const [codeIn,setCodeIn]=useState(initialHash);
  const [nameIn,setNameIn]=useState('');
  const [myId]=useState(genId);
  const [gs,setGs]=useState(null);
  const [dec,setDec]=useState({contract:null,param:null});
  const [locked,setLocked]=useState(false);
  const [joinErr,setJoinErr]=useState('');
  const [joining,setJoining]=useState(false);
  const pollRef=useRef(null);

  useEffect(()=>{
    if(!gameCode)return;
    const run=async()=>{const s=await storage.get(sk(gameCode));if(s)setGs(s)};
    run();pollRef.current=setInterval(run,2500);
    return()=>clearInterval(pollRef.current);
  },[gameCode]);

  const createGame=async()=>{
    const code=genCode();
    const s={code,phase:'lobby',scenario:null,createdAt:Date.now(),teams:{}};
    storage.set(sk(code),s);
    setGameCode(code);setGs(s);setScreen('host');
  };

  const joinGame=async()=>{
    const code=codeIn.toUpperCase().trim();
    if(code.length!==4){setJoinErr('Enter a 4-character code');return}
    if(!nameIn.trim()){setJoinErr('Enter your team name');return}
    setJoining(true);setJoinErr('');
    const s=await storage.get(sk(code));
    if(!s){setJoinErr('Game not found — check the code');setJoining(false);return}
    if(s.phase!=='lobby'){setJoinErr('Game already in progress');setJoining(false);return}
    const up={...s,teams:{...s.teams,[myId]:{name:nameIn.trim(),joined:Date.now(),contract:null,param:null,locked:false}}};
    await storage.set(sk(code),up);
    setGameCode(code);setGs(up);setScreen('player');setJoining(false);
  };

  const startDecisions=()=>{const up={...gs,phase:'decisions'};storage.set(sk(gameCode),up);setGs(up)};

  const revealScenario=()=>{
    const sc=SC[Math.floor(Math.random()*SC.length)];
    const up={...gs,phase:'scores',scenario:sc};storage.set(sk(gameCode),up);setGs(up);
  };

  const lockIn=async()=>{
    if(!dec.contract||!dec.param)return;
    const latest=await storage.get(sk(gameCode))||gs;
    const up={...latest,teams:{...latest.teams,[myId]:{...latest.teams[myId],contract:dec.contract,param:dec.param,locked:true}}};
    await storage.set(sk(gameCode),up);setGs(up);setLocked(true);
  };

  const reset=()=>{
    setScreen('welcome');setGameCode('');setCodeIn('');setNameIn('');
    setGs(null);setDec({contract:null,param:null});setLocked(false);setJoinErr('');
  };

  if(screen==='host'&&gs){
    const teams=Object.values(gs.teams);const allL=teams.length>0&&teams.every(t=>t.locked);
    if(gs.phase==='lobby')return h(HostLobby,{code:gameCode,teams,onStart:startDecisions});
    if(gs.phase==='decisions')return h(HostDecisions,{code:gameCode,teams,allLocked:allL,onReveal:revealScenario});
    if(gs.phase==='scores')return h(HostScores,{gs,onNewGame:reset});
  }
  if(screen==='player'&&gs){
    const myTeam=gs.teams[myId];const teams=Object.values(gs.teams);
    if(gs.phase==='lobby')return h(PlayerLobby,{myName:myTeam?.name||nameIn,teams});
    if(gs.phase==='decisions'&&!locked)return h(PlayerDecisions,{dec,setDec,onLock:lockIn});
    if(gs.phase==='decisions'&&locked)return h(PlayerWaiting,{teams,dec});
    if(gs.phase==='scores')return h(PlayerScores,{gs,myId});
  }
  if(screen==='player_join')return h(JoinScreen,{code:codeIn,setCode:setCodeIn,name:nameIn,setName:setNameIn,onJoin:joinGame,err:joinErr,loading:joining});

  return h('div',{className:'pad fade'},
    h('div',{style:{fontSize:56,margin:'1.5rem 0 1rem'}},'⚡'),
    h('h1',null,'BESS contract game'),
    h('p',{style:{marginBottom:'2rem'}},'Live multiplayer — you are EEM. EIS owns a 20MW/40MWh BESS in Germany. Negotiate your contract. Then face the market.'),
    h('div',{style:{display:'flex',flexDirection:'column',gap:10}},
      h('button',{className:'btn-primary',onClick:createGame,style:{fontSize:15}},'Host a game (projector) ↗'),
      h('button',{className:'btn-outline',onClick:()=>setScreen('player_join'),style:{fontSize:14}},'Join as player (phone) ↗')
    )
  )
}

ReactDOM.createRoot(document.getElementById('app')).render(h(App,null));
</script>
</body>
</html>
