<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BESS Deal Game</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:#f0efec;color:#1a1a1a;min-height:100vh;display:flex;justify-content:center}
#app{width:100%;max-width:480px;min-height:100vh;background:#fff}
h1{font-size:22px;font-weight:700;line-height:1.2;margin-bottom:.5rem}
h2{font-size:18px;font-weight:700;line-height:1.3;margin-bottom:.375rem}
p{font-size:14px;color:#555;line-height:1.7}
.label{font-size:11px;font-weight:700;letter-spacing:.07em;color:#999;text-transform:uppercase;margin-bottom:.5rem;display:block}
.pad{padding:1.5rem 1.25rem}
.scene{background:#1c1c1e;color:#fff;padding:1.25rem;border-radius:14px;margin-bottom:1.25rem}

.pip.active{background:#BA7517}

.opt{width:100%;padding:14px;background:#fff;border:1.5px solid #e8e8e8;border-radius:14px;text-align:left;display:flex;gap:12px;align-items:flex-start;cursor:pointer;margin-bottom:.625rem;transition:border-color .12s}
.opt:hover{border-color:#bbb}
.opt.on{border-width:2.5px;background:#fafafa}
.opt-ico{font-size:22px;flex-shrink:0;margin-top:1px}
.opt-ttl{font-size:14px;font-weight:700;color:#1a1a1a;margin-bottom:3px}
.opt-sub{font-size:12px;color:#666;margin-bottom:2px}
.opt-risk{font-size:11px;color:#c0392b}
.chk{font-size:20px;flex-shrink:0;align-self:center;margin-left:auto}
button{font-family:inherit;cursor:pointer;border:none;outline:none}
.btn{width:100%;padding:15px;font-size:15px;font-weight:700;border-radius:14px;transition:opacity .15s}
.btn-dark{background:#1a1a1a;color:#fff}
.btn-dark:hover{background:#333}
.btn-dark:disabled{background:#ccc;cursor:not-allowed}
.btn-ghost{background:#f5f5f5;color:#1a1a1a;border:1.5px solid #e8e8e8}
.card{background:#f7f6f2;border-radius:14px;padding:1rem 1.125rem;margin-bottom:.875rem}
.row{background:#fff;border:1.5px solid #e8e8e8;border-radius:12px;padding:.875rem 1rem;margin-bottom:.625rem}
.row.win{border-width:2.5px}
.irr-box{border-radius:16px;padding:1.5rem;text-align:center;margin-bottom:1.25rem}
.irr-box.up{background:#e8f5ee}
.irr-box.dn{background:#fdf0f0}
.irr-n{font-size:56px;font-weight:900;line-height:1;margin-bottom:.25rem}
.irr-n.up{color:#0a7c5c}
.irr-n.dn{color:#c0392b}
.irr-v{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-top:.25rem}
.irr-v.up{color:#0a7c5c}
.irr-v.dn{color:#c0392b}
.dot{border-radius:50%;display:inline-flex;align-items:center;justify-content:center;color:#fff;font-weight:800;flex-shrink:0}
.bdg{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:700}
.url-box{background:#f7f6f2;border-radius:10px;padding:10px 12px;font-size:12px;word-break:break-all;font-family:monospace;color:#444;margin-bottom:10px;line-height:1.6}
input{width:100%;box-sizing:border-box;padding:11px 14px;border:1.5px solid #e0e0e0;border-radius:10px;font-size:14px;font-family:inherit;outline:none}
input:focus{border-color:#1a1a1a}
@keyframes fadein{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.fade{animation:fadein .22s ease}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.pulse{animation:blink 1.6s ease-in-out infinite}
</style>
</head>
<body>
<div id="app"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
const {useState,useEffect,useRef}=React;
const h=React.createElement;
const TC=['#1D9E75','#2176AE','#BA7517','#C0392B','#6C3FB5','#C25B7A'];
const HURDLE=8.4;
const ASSET='20MW / 40MWh · Germany · COD June 2027 · 15yr tenor';
const JBLOB='https://jsonblob.com/api/jsonBlob';

// ─── Storage (jsonblob.com — zero setup, no accounts needed) ─────────────────
async function createBlob(data){
  const res=await fetch(JBLOB,{method:'POST',headers:{'Content-Type':'application/json','Accept':'application/json'},body:JSON.stringify(data)});
  if(!res.ok)throw new Error('Could not create game');
  // jsonblob returns the blob ID in X-jsonblob-id header
  let id=res.headers.get('X-jsonblob-id');
  if(!id){
    const loc=res.headers.get('Location')||'';
    id=loc.split('/').filter(Boolean).pop();
  }
  if(!id)throw new Error('Could not get game ID');
  return id;
}
async function readBlob(id){
  try{
    const res=await fetch(`${JBLOB}/${id}`,{cache:'no-store'});
    if(!res.ok)return null;
    return await res.json();
  }catch{return null}
}
async function writeBlob(id,data){
  try{
    const res=await fetch(`${JBLOB}/${id}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
    return res.ok;
  }catch{return false}
}

// Also support window.storage (Claude artifact environment)
async function storageRead(id){
  if(typeof window.storage!=='undefined'){try{const r=await window.storage.get('g_'+id,true);return r?JSON.parse(r.value):null}catch{}}
  return readBlob(id);
}
async function storageWrite(id,val){
  if(typeof window.storage!=='undefined'){try{await window.storage.set('g_'+id,JSON.stringify(val),true);return true}catch{}}
  return writeBlob(id,val);
}
async function storageCreate(data){
  if(typeof window.storage!=='undefined'){
    const id=Math.random().toString(36).substr(2,12);
    await window.storage.set('g_'+id,JSON.stringify(data),true);
    return id;
  }
  return createBlob(data);
}

// ─── Game config ──────────────────────────────────────────────────────────────
const CD={
  A:{name:'Fixed internal tolling',tag:'Tolling',icon:'🔒',col:'#2176AE',
    desc:'EEM pays EIS a fixed annual fee per MW and keeps 100% of trading upside. EIS has zero market exposure.',
    risk:'Fee owed unconditionally — if the market collapses, EEM still pays.',
    s2:`EIS nods. Fixed tolling works for them — their investors need certainty. Now they want a number.\n\n"What annual fee per MW is EEM committing to?" their CFO asks, sliding a blank term sheet across the table.\n\nThe fee is EEM's guaranteed cost base for 15 years. Too low and EIS walks. Too high and EEM's IRR suffers regardless of market performance.`,
    q2:'What annual fee does EEM offer EIS per MW?',
    params:[
      {id:'100k',label:'€100k / MW / yr',sub:'€2.0M / yr total · aggressive — tight margin for EIS'},
      {id:'120k',label:'€120k / MW / yr',sub:'€2.4M / yr total · market standard, balanced'},
      {id:'140k',label:'€140k / MW / yr',sub:'€2.8M / yr total · premium — EIS signs today'}
    ]},
  B:{name:'Floor + revenue share',tag:'Floor + Share',icon:'⚖️',col:'#1D9E75',
    desc:'EIS gets a guaranteed floor of €100k/MW/yr. EEM keeps a negotiated % of revenues above it. EEM absorbs any shortfall below the floor.',
    risk:'Below the floor, EEM is fully on the hook. Shortfall comes out of EEM\'s P&L.',
    s2:`"A floor works for us," EIS says. "But we want participation in the upside — that's how we compensate for lower certainty."\n\nThe floor is fixed: €100k/MW/yr (€2.0M/yr). EEM absorbs any shortfall. In exchange, you negotiate what share of revenues above the floor EEM retains.\n\nThe more EEM keeps, the harder the negotiation.`,
    q2:'What share of revenues above the floor does EEM keep?',
    params:[
      {id:'50',label:'50% rev share above floor',sub:'Conservative — EEM keeps half the upside'},
      {id:'70',label:'70% rev share above floor',sub:'Balanced — EEM retains most of the upside'},
      {id:'90',label:'90% rev share above floor',sub:'Aggressive — EEM keeps nearly all upside'}
    ]},
  C:{name:'Full merchant rev share',tag:'Merchant',icon:'⚡',col:'#BA7517',
    desc:'No floors, no guarantees. EEM captures all revenues and splits with EIS at a pre-agreed ratio. Both parties ride the market — upside and downside.',
    risk:'Pure market exposure for both sides. No protection when markets turn.',
    s2:`EIS pauses. "No floor, no guarantees — you're asking us to ride the market with you."\n\nA long silence. Then: "We can live with that if the split reflects the risk we're taking."\n\nWhatever EEM generates — FCR, aFRR, arbitrage — it gets split immediately at the ratio agreed now. EIS wins when EEM wins. When markets turn, neither party is protected.`,
    q2:'What share of all revenues does EEM retain?',
    params:[
      {id:'60',label:'60% EEM / 40% EIS',sub:'Balanced — EIS keeps meaningful participation'},
      {id:'70',label:'70% EEM / 30% EIS',sub:'EEM-favouring — market standard for optimisers'},
      {id:'80',label:'80% EEM / 20% EIS',sub:'Aggressive — EEM captures the vast majority of P&L'}
    ]}
};
const DD={
  FCR:{label:'FCR-first',icon:'〰️',col:'#2176AE',sub:'Primary frequency response · stable daily auctions, lower volatility',risk:'Exposed if FCR prices compress; insulated from aFRR regulatory risk'},
  aFRR:{label:'aFRR-first',icon:'📡',col:'#1D9E75',sub:'Automatic frequency restoration · higher revenues, more complex',risk:'Highly vulnerable to aFRR regulatory changes or access restrictions'},
  Arbitrage:{label:'Arbitrage-first',icon:'📈',col:'#BA7517',sub:'DA/ID price spread trading · highest ceiling, fully market-dependent',risk:'Maximum exposure to wholesale market volatility and capacity gluts'}
};
const SC=[
  {id:'bull',emoji:'📈',accent:'#1D9E75',rtype:'Market dynamics — upside',title:'The bull run',headline:'Revenues 40% above forecast',
   detail:'Grid volatility surged as renewable penetration hit record levels. FCR auctions tightened, aFRR demand spiked, and day-ahead spreads widened materially. The German BESS market delivered exceptional returns across all revenue stacks.',
   takeaway:'Your contract structure determined how much of the upside EEM captured. Merchant players took the full run. Fixed tolling teams made money — but their ceiling was locked in from day one.',
   optimal:'Best: Contract C (80% EEM share) + Arbitrage-first + full market exposure.'},
  {id:'crash',emoji:'📉',accent:'#C0392B',rtype:'Market dynamics — downside',title:'The market shock',headline:'Revenues 45% below forecast — FCR cannibalism',
   detail:'Over 1.2GW of new BESS entered Germany in 18 months. FCR prices collapsed 40%. aFRR and DA/ID spreads compressed sharply. By Year 3, the revenue stack looked nothing like base case.',
   takeaway:'EEM bears market risk as the optimiser in all contracts. But structure determines how much EIS obligation remains when revenues collapse. Fixed tolling at low fee capped the damage.',
   optimal:'Best: Contract A (€100k fee) + FCR-first + market protection clause.'},
  {id:'delay',emoji:'⏳',accent:'#BA7517',rtype:'Build risk',title:'The build delay',headline:'COD pushed 12 months to June 2028',
   detail:'Grid connection permitting ran 12 months over — a TSO queue issue across Bavaria. EIS absorbed the construction overrun. But EEM lost Year 1 of a 15-year declining revenue curve. The first year was the most valuable.',
   takeaway:'Build risk sits with EIS on paper. But Year 1 on a declining 15yr curve is the most valuable year for EEM. High-revenue strategies felt this most acutely.',
   optimal:'Best: Contract A or B + any dispatch + market protection (delays trigger the shared risk clause).'},
  {id:'policy',emoji:'⚖️',accent:'#6C3FB5',rtype:'Policy change',title:'The regulatory shock',headline:'BNetzA caps aFRR access for standalone BESS',
   detail:'A new ruling restricted aFRR participation for standalone BESS without a TSO network service agreement. Most 2027-vintage assets were locked out for two years. FCR unaffected. Arbitrage took collateral damage from intraday rule changes.',
   takeaway:'Policy risk hits EEM as the licenced participant. Fixed tolling teams still owe EIS their fee — now with reduced revenues to cover it. aFRR-heavy strategies took the hardest hit.',
   optimal:'Best: Contract C + FCR-first + market protection (policy counts as a shared risk event).'}
];

// ─── IRR model ────────────────────────────────────────────────────────────────
const BIRR={A:{'100k':14.5,'120k':11.2,'140k':8.3},B:{'50':10.8,'70':13.5,'90':16.2},C:{'60':12.0,'70':15.5,'80':19.0}};
const SM={
  bull:  {A:{'100k':1.40,'120k':1.38,'140k':1.35},B:{'50':1.45,'70':1.43,'90':1.41},C:{'60':1.50,'70':1.52,'80':1.55}},
  crash: {A:{'100k':0.42,'120k':0.30,'140k':0.15},B:{'50':0.55,'70':0.50,'90':0.44},C:{'60':0.65,'70':0.60,'80':0.55}},
  delay: {A:{'100k':0.72,'120k':0.75,'140k':0.78},B:{'50':0.74,'70':0.74,'90':0.74},C:{'60':0.70,'70':0.70,'80':0.80}},
  policy:{A:{'100k':0.80,'120k':0.78,'140k':0.76},B:{'50':0.75,'70':0.75,'90':0.75},C:{'60':0.82,'70':0.82,'80':0.82}}
};
const DA={FCR:{bull:.5,crash:1.5,delay:.3,policy:1.2},aFRR:{bull:1.5,crash:-.5,delay:.3,policy:-4},Arbitrage:{bull:2.5,crash:-1,delay:.3,policy:-1.5}};
const RA={accept:{bull:-1.5,crash:3,delay:.8,policy:1.5},decline:{bull:.5,crash:-.5,delay:-.3,policy:-.2}};
function calcIRR(c,t,d,r,s){
  const b=BIRR[c]?.[t]??10,m=SM[s]?.[c]?.[t]??1,da=DA[d]?.[s]??0,ra=RA[r]?.[s]??0;
  return Math.round((b*m+da+ra)*10)/10;
}

// ─── Helpers ──────────────────────────────────────────────────────────────────
const genId=()=>Math.random().toString(36).substr(2,10);
function Dot({color,size=28,name}){return h('div',{className:'dot',style:{width:size,height:size,background:color,fontSize:size*.36}},name[0].toUpperCase())}
function Scene({tag,text}){return h('div',{className:'scene'},h('span',{className:'scene-tag'},tag),h('div',{className:'scene-text'},text))}
function PBar({step}){
  return h('div',{className:'progress-row'},
    Array.from({length:4},(_,i)=>h('div',{key:i,className:'pip'+(i<step?' done':i===step?' active':'')})),
    h('span',{className:'step-lbl'},`Step ${step+1} of 4`)
  )
}

// ─── Join URL helpers ─────────────────────────────────────────────────────────
function getPageBase(){try{const u=window.location.href;return u.split('#')[0]}catch{return''}}
function buildJoinUrl(gameId){return`${getPageBase()}#${gameId}`}
function getGameIdFromHash(){try{const h2=window.location.hash.slice(1);return h2.length>4?h2:''}catch{return''}}
function QRImg({url}){
  if(!url||!url.startsWith('http'))return null;
  const src=`https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(url)}`;
  return h('img',{src,width:150,height:150,style:{borderRadius:8,border:'1.5px solid #e8e8e8'},alt:'QR code'});
}

// ─── HOST ─────────────────────────────────────────────────────────────────────
function HostLobby({gameId,teams,onStart}){
  const joinUrl=buildJoinUrl(gameId);
  const isPublic=joinUrl.startsWith('http');
  const [copied,setCopied]=useState(false);
  const copy=()=>{navigator.clipboard?.writeText(joinUrl).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2000)})};
  return h('div',{className:'pad fade'},
    h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'1.5rem'}},
      h('div',null,h('span',{className:'label'},'HOST · BESS DEAL GAME'),h('h2',null,'Waiting for teams')),
      h('div',{style:{textAlign:'right'}},
        h('span',{className:'label'},'THE ASSET'),
        h('div',{style:{fontSize:12,fontWeight:600,color:'#888',maxWidth:140,textAlign:'right'}},ASSET)
      )
    ),
    h('div',{className:'card'},
      h('span',{className:'label'},'SHARE THIS LINK WITH PLAYERS'),
      h('div',{className:'url-box'},joinUrl),
      h('div',{style:{display:'flex',gap:8}},
        h('button',{onClick:copy,className:'btn btn-dark',style:{flex:1,padding:'11px',fontSize:13,borderRadius:10}},copied?'Copied ✓':'Copy link'),
        isPublic&&h('div',{style:{flexShrink:0}},h(QRImg,{url:joinUrl}))
      ),
      !isPublic&&h('div',{style:{marginTop:10,padding:'8px 10px',background:'#fff8ed',border:'1px solid #f0d080',borderRadius:8,fontSize:12,color:'#886600'}},
        '⚠️ File is open locally. To share with others, upload to ',
        h('a',{href:'https://netlify.com/drop',target:'_blank',style:{color:'#2176AE',fontWeight:600}},'netlify.com/drop'),
        ' (free, drag & drop, 30 seconds) and reopen the hosted link.'
      )
    ),
    h('div',{className:'card',style:{marginBottom:'1.25rem'}},
      h('span',{className:'label'},'HOW PLAYERS JOIN'),
      h('ol',{style:{paddingLeft:16,fontSize:13,color:'#666',lineHeight:2.2,margin:0}},
        h('li',null,'Open the link or scan QR'),
        h('li',null,'Type their team name'),
        h('li',null,'Tap "Join deal"'),
        h('li',null,'Complete 4 decisions on their phone')
      )
    ),
    h('div',{style:{marginBottom:'1.5rem'}},
      h('span',{className:'label'},`TEAMS JOINED (${teams.length})`),
      teams.length===0
        ?h('p',{style:{fontStyle:'italic',fontSize:14}},'No teams yet — share the link above')
        :teams.map((t,i)=>h('div',{key:i,style:{display:'flex',alignItems:'center',gap:10,padding:'8px 0',borderBottom:'1px solid #f0f0f0'}},
            h(Dot,{color:TC[i%6],size:28,name:t.name}),
            h('span',{style:{fontSize:14,fontWeight:600}},t.name)
          ))
    ),
    h('button',{className:'btn btn-dark',onClick:onStart,disabled:teams.length<1,style:{opacity:teams.length>=1?1:.3}},
      teams.length===0?'Waiting for players...':`Start — ${teams.length} team${teams.length!==1?'s':''} ready ↗`)
  )
}

function HostDecisions({gameId,teams,onReveal}){
  const allLocked=teams.length>0&&teams.every(t=>t.locked);
  return h('div',{className:'pad fade'},
    h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'1.5rem'}},
      h('div',null,h('span',{className:'label'},'HOST · BESS DEAL GAME'),h('h2',null,'Teams negotiating...')),
      h('div',null)
    ),
    teams.map((t,i)=>h('div',{key:i,style:{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'14px',marginBottom:8,background:'#fff',border:t.locked?`2.5px solid ${TC[i%6]}`:'1.5px solid #e8e8e8',borderRadius:14}},
      h('div',{style:{display:'flex',alignItems:'center',gap:10}},h(Dot,{color:TC[i%6],size:30,name:t.name}),h('span',{style:{fontSize:14,fontWeight:700}},t.name)),
      t.locked
        ?h('span',{className:'bdg',style:{background:TC[i%6]+'18',color:TC[i%6]}},'All in ✓')
        :h('div',{style:{display:'flex',alignItems:'center',gap:6}},
            h('span',{className:'pulse',style:{width:8,height:8,borderRadius:'50%',background:'#BA7517',display:'inline-block'}}),
            h('span',{style:{fontSize:12,color:'#aaa'}},'Negotiating...')
          )
    )),
    h('div',{style:{marginTop:'1.5rem'}},
      allLocked
        ?h('button',{className:'btn btn-dark',onClick:onReveal},'Reveal the scenario ↗')
        :h('div',null,
            h('p',{style:{textAlign:'center',marginBottom:12}},'Waiting for all teams to submit...'),
            h('button',{className:'btn btn-ghost',onClick:onReveal,style:{opacity:.5}},'Force reveal ↗')
          )
    )
  )
}

function HostScores({gs,onNewGame}){
  const sc=gs.scenario;
  const teams=Object.values(gs.teams).map((t,i)=>({...t,ci:i,irr:calcIRR(t.contract,t.terms,t.dispatch,t.risk,sc.id)})).sort((a,b)=>b.irr-a.irr);
  return h('div',{className:'pad fade'},
    h('div',{style:{border:`2.5px solid ${sc.accent}`,borderRadius:16,padding:'1.25rem',marginBottom:'1.25rem',background:sc.accent+'0d'}},
      h('div',{style:{fontSize:32,marginBottom:6}},sc.emoji),
      h('span',{className:'label',style:{color:sc.accent,display:'block',marginBottom:4}},sc.rtype),
      h('h2',null,sc.title),
      h('div',{style:{fontSize:14,fontWeight:700,margin:'4px 0 8px'}},sc.headline),
      h('p',{style:{fontSize:12,marginBottom:8}},sc.detail),
      h('div',{style:{borderTop:'1px solid '+sc.accent+'44',paddingTop:8}},h('p',{style:{fontSize:12}},sc.takeaway))
    ),
    h('span',{className:'label'},'RESULTS — IRR vs '+HURDLE+'% HURDLE'),
    teams.map((t,rank)=>{
      const above=t.irr>=HURDLE;const isW=rank===0;
      const cdef=CD[t.contract];const pdef=cdef?.params.find(p=>p.id===t.terms);
      return h('div',{key:t.name+rank,className:'row'+(isW?' win':''),style:{borderColor:isW?TC[t.ci%6]:'#e8e8e8'}},
        h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}},
          h('div',{style:{display:'flex',alignItems:'center',gap:8}},
            h('span',{style:{fontSize:12,color:'#bbb',width:16}},`${rank+1}.`),
            h(Dot,{color:TC[t.ci%6],size:28,name:t.name}),
            h('span',{style:{fontSize:14,fontWeight:700}},t.name),
            isW&&h('span',{className:'bdg',style:{background:'#FAC775',color:'#412402',marginLeft:4}},'Winner 🏆')
          ),
          h('div',{style:{textAlign:'right'}},
            h('div',{style:{fontSize:22,fontWeight:900,color:above?'#0a7c5c':'#c0392b'}},`${t.irr}%`),
            h('div',{style:{fontSize:11,fontWeight:700,color:above?'#0a7c5c':'#c0392b'}},above?`+${(t.irr-HURDLE).toFixed(1)}% vs hurdle`:`${(t.irr-HURDLE).toFixed(1)}% vs hurdle`)
          )
        ),
        h('div',{style:{display:'flex',gap:5,flexWrap:'wrap'}},
          cdef&&h('span',{className:'bdg',style:{background:cdef.col+'18',color:cdef.col}},cdef.tag),
          pdef&&h('span',{className:'bdg',style:{background:'#f0f0f0',color:'#555'}},pdef.label),
          h('span',{className:'bdg',style:{background:'#f0f0f0',color:'#555'}},DD[t.dispatch]?.label||t.dispatch),

    h('button',{onClick:()=>setDec(p=>({...p,risk:'accept'})),className:'opt'+(sel==='accept'?' on':''),style:{borderColor:sel==='accept'?'#0a7c5c':'#e8e8e8',borderWidth:sel==='accept'?2.5:1.5,alignItems:'flex-start',marginBottom:'.625rem'}},
      h('div',{className:'opt-ico'},'🛡️'),
      h('div',{style:{flex:1}},h('div',{className:'opt-ttl'},'Accept — take the shared risk clause'),h('div',{className:'opt-sub'},'EIS absorbs 30% of shortfall below €2.5M/yr, takes 30% above €4M/yr.'),h('div',{className:'opt-risk',style:{color:'#888'}},'Insurance in bad scenarios — costs you in a bull market.')),
      sel==='accept'&&h('div',{className:'chk',style:{color:'#0a7c5c'}},'✓')
    ),
    h('button',{onClick:()=>setDec(p=>({...p,risk:'decline'})),className:'opt'+(sel==='decline'?' on':''),style:{borderColor:sel==='decline'?'#c0392b':'#e8e8e8',borderWidth:sel==='decline'?2.5:1.5,alignItems:'flex-start'}},
      h('div',{className:'opt-ico'},'⚡'),
      h('div',{style:{flex:1}},h('div',{className:'opt-ttl'},'Decline — hold full market exposure'),h('div',{className:'opt-sub'},'EEM keeps 100% of upside, bears 100% of downside.'),h('div',{className:'opt-risk'},'Strongest in bull markets. Fully exposed in crashes and policy shocks.')),
      sel==='decline'&&h('div',{className:'chk',style:{color:'#c0392b'}},'✓')
    ),
    h('button',{className:'btn btn-dark',onClick:onSubmit,disabled:!sel,style:{marginTop:'1.25rem',opacity:sel?1:.3}},'Submit all decisions ↗')
  )
}

function PlayerWaiting({teams,dec}){
  const locked=teams.filter(t=>t.locked).length;
  const cdef=CD[dec.contract];const pdef=cdef?.params.find(p=>p.id===dec.terms);const ddef=DD[dec.dispatch];
  return h('div',{className:'pad fade'},
    h('div',{style:{fontSize:40,textAlign:'center',margin:'1.5rem 0 1rem'}},'🔒'),

    h('p',{style:{textAlign:'center',marginBottom:'1.5rem'}},'Waiting for the host to reveal the scenario...'),
    h('div',{className:'card',style:{marginBottom:'1.25rem'}},
      h('span',{className:'label'},'YOUR DEAL'),
      h('div',{style:{display:'flex',gap:6,flexWrap:'wrap'}},
        cdef&&h('span',{className:'bdg',style:{background:cdef.col+'18',color:cdef.col}},`Contract ${dec.contract}`),
        pdef&&h('span',{className:'bdg',style:{background:'#f0f0f0',color:'#555'}},pdef.label),
        ddef&&h('span',{className:'bdg',style:{background:'#f0f0f0',color:'#555'}},ddef.label),
        h('span',{className:'bdg',style:{background:dec.risk==='accept'?'#e8f5ee':'#f0f0f0',color:dec.risk==='accept'?'#0a7c5c':'#555'}},dec.risk==='accept'?'Protected':'Full exposure')
      )
    ),

      h('div',{style:{display:'flex',alignItems:'center',gap:8}},h(Dot,{color:TC[i%6],size:24,name:t.name}),t.name),
      t.locked?h('span',{style:{color:'#0a7c5c',fontWeight:700,fontSize:12}},'✓'):h('span',{className:'pulse',style:{width:8,height:8,borderRadius:'50%',background:'#BA7517',display:'inline-block'}})
    ))
  )
}

function PlayerScores({gs,myId}){
  const sc=gs.scenario;
  const teams=Object.entries(gs.teams).map(([id,t],i)=>({...t,id,ci:i,irr:calcIRR(t.contract,t.terms,t.dispatch,t.risk,sc.id)})).sort((a,b)=>b.irr-a.irr);
  const me=teams.find(t=>t.id===myId);
  const myIrr=me?.irr??0;const above=myIrr>=HURDLE;
  return h('div',{className:'pad fade'},
    h('div',{style:{border:`2.5px solid ${sc.accent}`,borderRadius:16,padding:'1.125rem',marginBottom:'1.25rem',background:sc.accent+'0d'}},
      h('div',{style:{fontSize:28,marginBottom:4}},sc.emoji),
      h('span',{className:'label',style:{color:sc.accent,display:'block',marginBottom:2}},sc.rtype),
      h('h2',null,sc.title),
      h('p',{style:{fontSize:12,marginTop:4,fontWeight:600}},sc.headline)
    ),
    me&&h('div',{className:`irr-box ${above?'up':'dn'}`},
      h('span',{className:'label',style:{display:'block',marginBottom:8}},'YOUR DEAL IRR'),
      h('div',{className:`irr-n ${above?'up':'dn'}`},`${myIrr}%`),
      h('div',{style:{fontSize:13,color:'#888',margin:'4px 0 6px'}},`EEM hurdle rate: ${HURDLE}%`),
      h('div',{className:`irr-v ${above?'up':'dn'}`},above?'Above hurdle — deal approved ✓':'Below hurdle — value destructive ✗'),
      h('div',{style:{fontSize:11,color:'#888',marginTop:4}},`${above?'+':''}${(myIrr-HURDLE).toFixed(1)}% vs hurdle`)
    ),
    h('span',{className:'label'},'ALL TEAMS'),
    teams.map((t,rank)=>{
      const isMe=t.id===myId;const a2=t.irr>=HURDLE;const isW=rank===0;
      return h('div',{key:t.id,style:{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'11px 12px',marginBottom:6,background:'#fff',border:isW?`2.5px solid ${TC[t.ci%6]}`:'1.5px solid #e8e8e8',borderRadius:12}},
        h('div',{style:{display:'flex',alignItems:'center',gap:8}},
          h('span',{style:{fontSize:12,color:'#ccc',width:16}},`${rank+1}.`),
          h(Dot,{color:TC[t.ci%6],size:26,name:t.name}),
          h('span',{style:{fontSize:14,fontWeight:isMe?700:500}},t.name),
          isMe&&h('span',{className:'bdg',style:{background:'#f0f0f0',color:'#888',marginLeft:4}},'you'),
          isW&&h('span',{className:'bdg',style:{background:'#FAC775',color:'#412402',marginLeft:4}},'🏆')
        ),
        h('span',{style:{fontSize:18,fontWeight:900,color:a2?'#0a7c5c':'#c0392b'}},`${t.irr}%`)
      )
    }),
    h('div',{className:'card',style:{marginTop:'1rem'}},h('span',{className:'label'},'OPTIMAL PLAY'),h('p',{style:{fontSize:12}},sc.optimal))
  )
}

// ─── App ──────────────────────────────────────────────────────────────────────
function App(){
  const initGameId=getGameIdFromHash();
  const [screen,setScreen]=useState(initGameId?'joining':'welcome');
  const [gameId,setGameId]=useState(initGameId);
  const [gs,setGs]=useState(null);
  const [myId]=useState(genId);
  const [myName,setMyName]=useState('');
  const [isHost,setIsHost]=useState(false);
  const [dec,setDec]=useState({contract:null,terms:null,dispatch:null,risk:null});
  const [step,setStep]=useState(1);
  const [submitted,setSubmitted]=useState(false);
  const [err,setErr]=useState('');
  const [joining,setJoining]=useState(false);
  const [creating,setCreating]=useState(false);
  const pollRef=useRef(null);

  useEffect(()=>{
    if(!gameId)return;
    const run=async()=>{const s=await storageRead(gameId);if(s)setGs(s)};
    run();pollRef.current=setInterval(run,2500);
    return()=>clearInterval(pollRef.current);
  },[gameId]);

  const hostGame=async()=>{
    setCreating(true);
    try{
      const s={phase:'lobby',teams:{},scenario:null,created:Date.now()};
      const id=await storageCreate(s);
      setGameId(id);setGs(s);setIsHost(true);setScreen('host');
      // Update URL hash so reloading preserves game (host only)
      try{window.history.replaceState(null,'',`${getPageBase()}#${id}`)}catch{}
    }catch(e){
      alert('Could not create game. If opening locally, this needs an internet connection to jsonblob.com. Try uploading to netlify.com/drop first.');
    }
    setCreating(false);
  };

  const joinGame=async()=>{
    if(!myName.trim()){setErr('Enter your team name');return}
    setJoining(true);setErr('');
    const s=await storageRead(gameId);
    if(!s){setErr('Game not found — make sure you opened the exact link the host shared');setJoining(false);return}
    if(s.phase!=='lobby'){setErr('Game already in progress');setJoining(false);return}
    const up={...s,teams:{...s.teams,[myId]:{name:myName.trim(),joined:Date.now(),locked:false,contract:null,terms:null,dispatch:null,risk:null}}};
    await storageWrite(gameId,up);
    setGs(up);setScreen('player');setJoining(false);
  };

  const startGame=async()=>{const up={...gs,phase:'decisions'};await storageWrite(gameId,up);setGs(up)};
  const reveal=async()=>{
    const sc=SC[Math.floor(Math.random()*SC.length)];
    const up={...gs,phase:'scores',scenario:sc};await storageWrite(gameId,up);setGs(up);
  };
  const nextStep=()=>setStep(p=>p+1);
  const submit=async()=>{
    const latest=await storageRead(gameId)||gs;
    const up={...latest,teams:{...latest.teams,[myId]:{...latest.teams[myId],...dec,locked:true}}};
    await storageWrite(gameId,up);setGs(up);setSubmitted(true);
  };
  const reset=()=>{setScreen('welcome');setGameId('');setGs(null);setDec({contract:null,terms:null,dispatch:null,risk:null});setStep(1);setSubmitted(false);setErr('');setIsHost(false);try{window.history.replaceState(null,'',getPageBase())}catch{}};

  // Host routing
  if(screen==='host'&&gs){
    const teams=Object.values(gs.teams);
    if(gs.phase==='lobby')return h(HostLobby,{gameId,teams,onStart:startGame});
    if(gs.phase==='decisions')return h(HostDecisions,{gameId,teams,onReveal:reveal});
    if(gs.phase==='scores')return h(HostScores,{gs,onNewGame:reset});
  }

  // Player routing
  if(screen==='player'&&gs){
    const teams=Object.values(gs.teams);
    if(gs.phase==='lobby')return h(PlayerLobby,{myName,teams});
    if(gs.phase==='decisions'&&!submitted){
      if(step===1)return h(Step1,{dec,setDec,onNext:nextStep});
      if(step===2)return h(Step2,{dec,setDec,onNext:nextStep});
      if(step===3)return h(Step3,{dec,setDec,onNext:nextStep});
      if(step===4)return h(Step4,{dec,setDec,onSubmit:submit});
    }
    if(gs.phase==='decisions'&&submitted)return h(PlayerWaiting,{teams,dec});
    if(gs.phase==='scores')return h(PlayerScores,{gs,myId});
  }

  // Auto-join screen (arrived via link)
  if(screen==='joining'){
    return h('div',{className:'pad fade'},
      h('div',{style:{fontSize:44,marginBottom:'1rem'}},'⚡'),
      h('h1',null,'Join the negotiation'),
      h('p',{style:{marginBottom:'1.5rem'}},'You\'ve been invited to play as EEM in the BESS deal game. Enter your team name to join.'),
      h('div',{style:{marginBottom:16}},
        h('span',{className:'label'},'TEAM NAME'),
        h('input',{value:myName,onChange:v=>setMyName(v.target.value),placeholder:'e.g. North Star Capital',autoFocus:true,
          onKeyDown:e=>{if(e.key==='Enter')joinGame()}})
      ),
      err&&h('div',{style:{fontSize:13,color:'#c0392b',marginBottom:12,padding:'8px 12px',background:'#fdf0f0',borderRadius:8}},err),
      h('button',{className:'btn btn-dark',onClick:joinGame,disabled:joining||!myName.trim(),style:{opacity:(joining||!myName.trim())?.3:1}},joining?'Joining...':'Join deal ↗')
    )
  }

  // Welcome screen
  return h('div',{className:'pad fade'},
    h('div',{style:{fontSize:52,marginBottom:'1rem'}},'⚡'),
    h('h1',null,'BESS deal game'),
    h('p',{style:{marginBottom:'1.25rem'}},'You are EEM. EIS owns a 20MW/40MWh BESS in Germany. Negotiate a 15-year deal across four decisions. One scenario reveals your IRR. Who beats the 8.4% hurdle?'),
    h('div',{className:'card',style:{marginBottom:'1.5rem'}},
      h('span',{className:'label'},'THE ASSET'),
      h('div',{style:{fontWeight:700,fontSize:13}},ASSET),
      h('p',{style:{fontSize:12,marginTop:2}},`EEM hurdle rate: ${HURDLE}% IRR · Players join via link — no setup needed`)
    ),
    h('div',{style:{display:'flex',flexDirection:'column',gap:10}},
      h('button',{className:'btn btn-dark',onClick:hostGame,disabled:creating},creating?'Creating game...':'Host a game ↗'),
      h('button',{className:'btn btn-ghost',onClick:()=>setScreen('joining')},'I have a join link ↗')
    )
  )
}

ReactDOM.createRoot(document.getElementById('app')).render(h(App,null));
</script>
